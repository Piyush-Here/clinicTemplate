<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
// Animate on scroll
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity=1;e.target.style.transform='translateY(0)';}});
},{threshold:.1});
document.querySelectorAll('.serviceCard,.docCard,.testiCard').forEach(el=>{
  el.style.opacity=0;el.style.transform='translateY(20px)';el.style.transition='opacity .5s ease,transform .5s ease';
  observer.observe(el);
});
</script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
